services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: ooumph-backend
    env_file:
      - .env.docker
    ports:
      - "6002:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ooumph-network
    volumes:
      - sqlite-data:/app/data
      - backend-logs:/app/logs
      - ./backend/uploads:/app/uploads
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
      args:
        - VITE_API_BASE_URL=http://YOUR_SERVER_IP:6002
    container_name: ooumph-frontend
    ports:
      - "6001:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - ooumph-network
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    container_name: ooumph-db
    environment:
      POSTGRES_DB: ooumph
      POSTGRES_USER: ooumph
      POSTGRES_PASSWORD: password
    ports:
      - "6003:5432"
    networks:
      - ooumph-network
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ooumph -d ooumph"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: ooumph-redis
    ports:
      - "6004:6379"
    networks:
      - ooumph-network
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped

networks:
  ooumph-network:
    driver: bridge

volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
  sqlite-data:
    driver: local
  backend-logs:
    driver: local
